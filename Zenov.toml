[package]
name = "zenov-os"
version = "0.1.1"
entry = "kernel/main.zv"

[target]
triple = "i686-zenov-none"
format = "flat-binary"
filesystem = "fat12+zenovfs1"
boot = "bios"

[language]
name = "Zenov"
extension = ".zv"

[implementation]
zenov = "system manifest and generated kernel configuration"
assembler = "boot, protected-mode entry, interrupts and userspace transitions"
cpp = "freestanding kernel, paging, storage, application loader and native build tools"
python = false
