name: Apply verified native shell patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: zenov-os-ui-shell-apply
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/zenov-os-0.1.1-windows-simple-shell
          fetch-depth: 2

      - name: Detect staged patch
        id: staged
        run: |
          if test -f .ci/ui-shell.patch.part.00; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Decode and apply locally verified patch
        if: steps.staged.outputs.present == 'true'
        run: |
          cat .ci/ui-shell.patch.part.* | base64 -d | gzip -d > /tmp/ui-shell.patch
          echo "70600dea73bc4acb309c36c4348b57c99c6615f4dd0213e3bc29eb0aa650de6c  /tmp/ui-shell.patch" | sha256sum -c -
          git apply --check /tmp/ui-shell.patch
          git apply /tmp/ui-shell.patch
          rm -f .ci/ui-shell.patch.part.*

      - name: Create verified commit object
        if: steps.staged.outputs.present == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import base64
          import json
          import os
          import subprocess
          import urllib.error
          import urllib.request

          token = os.environ["GH_TOKEN"]
          repository = os.environ["GH_REPOSITORY"]
          parent = subprocess.check_output(["git", "rev-parse", "HEAD"], text=True).strip()
          base_tree = subprocess.check_output(["git", "rev-parse", "HEAD^{tree}"], text=True).strip()
          status = subprocess.check_output(["git", "status", "--porcelain=v1"], text=True).splitlines()
          print("changed paths:")
          for line in status:
              print(line)

          def api(path, payload):
              request = urllib.request.Request(
                  f"https://api.github.com/repos/{repository}{path}",
                  data=json.dumps(payload).encode(),
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "Content-Type": "application/json",
                  },
                  method="POST",
              )
              try:
                  with urllib.request.urlopen(request) as response:
                      return json.load(response)
              except urllib.error.HTTPError as error:
                  print(f"API ERROR {path}: {error.code}")
                  print(error.read().decode(errors="replace"))
                  raise

          entries = []
          for line in status:
              state = line[:2]
              path = line[3:]
              if " -> " in path:
                  path = path.split(" -> ", 1)[1]
              if "D" in state:
                  entries.append({"path": path, "sha": None})
                  continue
              with open(path, "rb") as handle:
                  encoded = base64.b64encode(handle.read()).decode()
              blob = api("/git/blobs", {"content": encoded, "encoding": "base64"})
              mode = "100755" if os.access(path, os.X_OK) else "100644"
              entries.append({"path": path, "mode": mode, "type": "blob", "sha": blob["sha"]})

          tree = api("/git/trees", {"base_tree": base_tree, "tree": entries})
          commit = api("/git/commits", {
              "message": "ui: add Windows-simple customizable ZenovOS 0.1.1 shell [ui-shell-applied]",
              "tree": tree["sha"],
              "parents": [parent],
          })
          with open("generated-commit.txt", "w", encoding="utf-8") as handle:
              handle.write(commit["sha"] + "\n")
          print(f"generated-commit={commit['sha']}")
          PY

      - name: Verify strict native source before publishing branch
        if: steps.staged.outputs.present == 'true'
        run: make clean check

      - name: Upload verified commit SHA
        if: steps.staged.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: zenov-os-0.1.1-ui-shell-commit
          if-no-files-found: error
          path: generated-commit.txt
