name: ZenPkg

on:
  push:
    paths:
      - 'GNUmakefile'
      - 'zenpkg.mk'
      - 'tools/zenpkg/**'
      - 'tools/zenrepo/**'
      - 'tools/zenovfs_package_seed.cpp'
      - 'tools/zenpkg_transport_fault_test.cpp'
      - 'tools/zenpkg_blkdebug_seed.cpp'
      - 'tools/zenpkg_blkdebug_qemu_test.cpp'
      - 'tests/zenpkg_test.sh'
      - 'tests/zenrepo_test.sh'
      - 'tests/package_repository_kernel_test.cpp'
      - 'tests/package_transport_journal_test.cpp'
      - 'tests/qemu_zenpkg.sh'
      - 'tests/qemu_zenpkg_transport_recovery.sh'
      - 'tests/qemu_zenpkg_transport_faults.sh'
      - 'tests/qemu_zenpkg_blkdebug_breakpoints.sh'
      - 'packages/**'
      - 'security/zenrepo_crypto_material.hpp'
      - 'kernel/parts/package_format.inc'
      - 'kernel/parts/package_repository.inc'
      - 'kernel/parts/package_repository/**'
      - 'kernel/parts/package_manager.inc'
      - 'kernel/parts/package_manager/**'
      - 'kernel/parts/process_package_capabilities.inc'
      - 'kernel/parts/rsa_pss.inc'
      - 'kernel/parts/security_io.inc'
      - 'kernel/parts/security_paths.inc'
      - 'kernel/kernel.cpp'
      - 'docs/ZENPKG_FORMAT_1.md'
      - 'docs/ZENREPO_OFFLINE_0.1.1.md'
      - 'docs/ZENPKG_CACHE_0.1.1.md'
      - 'docs/ZENPKG_TRANSPORT_0.1.1.md'
      - 'docs/NATIVE_PACKAGE_MANAGER_0.1.1.md'
      - 'docs/PACKAGE_COMPATIBILITY_ARCHITECTURE.md'
      - '.github/workflows/zenpkg.yml'
      - '.github/workflows/zenrepo.yml'
  pull_request:
    paths:
      - 'GNUmakefile'
      - 'zenpkg.mk'
      - 'tools/zenpkg/**'
      - 'tools/zenrepo/**'
      - 'tools/zenovfs_package_seed.cpp'
      - 'tools/zenpkg_transport_fault_test.cpp'
      - 'tools/zenpkg_blkdebug_seed.cpp'
      - 'tools/zenpkg_blkdebug_qemu_test.cpp'
      - 'tests/zenpkg_test.sh'
      - 'tests/zenrepo_test.sh'
      - 'tests/package_repository_kernel_test.cpp'
      - 'tests/package_transport_journal_test.cpp'
      - 'tests/qemu_zenpkg.sh'
      - 'tests/qemu_zenpkg_transport_recovery.sh'
      - 'tests/qemu_zenpkg_transport_faults.sh'
      - 'tests/qemu_zenpkg_blkdebug_breakpoints.sh'
      - 'packages/**'
      - 'security/zenrepo_crypto_material.hpp'
      - 'kernel/parts/package_format.inc'
      - 'kernel/parts/package_repository.inc'
      - 'kernel/parts/package_repository/**'
      - 'kernel/parts/package_manager.inc'
      - 'kernel/parts/package_manager/**'
      - 'kernel/parts/process_package_capabilities.inc'
      - 'kernel/parts/rsa_pss.inc'
      - 'kernel/parts/security_io.inc'
      - 'kernel/parts/security_paths.inc'
      - 'kernel/kernel.cpp'
      - 'docs/ZENPKG_FORMAT_1.md'
      - 'docs/ZENREPO_OFFLINE_0.1.1.md'
      - 'docs/ZENPKG_CACHE_0.1.1.md'
      - 'docs/ZENPKG_TRANSPORT_0.1.1.md'
      - 'docs/NATIVE_PACKAGE_MANAGER_0.1.1.md'
      - 'docs/PACKAGE_COMPATIBILITY_ARCHITECTURE.md'
      - '.github/workflows/zenpkg.yml'
      - '.github/workflows/zenrepo.yml'

permissions:
  contents: read

env:
  CXX: g++
  SOURCE_DATE_EPOCH: '0'

jobs:
  package-manager:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    env:
      ZENOV_SOURCE_REVISION: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Verify tested source revision
        run: |
          [[ "$ZENOV_SOURCE_REVISION" =~ ^[0-9a-f]{40}$ ]]
          git cat-file -e "$ZENOV_SOURCE_REVISION^{commit}"
          echo "tested-source-revision=$ZENOV_SOURCE_REVISION"
      - name: Install strict native and QEMU toolchain
        run: sudo apt-get update && sudo apt-get install -y build-essential binutils openssl qemu-system-x86
      - name: Build signed-package image and host regressions
        run: |
          rm -f /tmp/zenpkg-check.log
          if ! make clean zenpkg-check > /tmp/zenpkg-check.log 2>&1; then
            tail -n 280 /tmp/zenpkg-check.log
            exit 1
          fi
          tail -n 160 /tmp/zenpkg-check.log
      - name: Run standalone ZenPkg format suite
        run: bash tests/zenpkg_test.sh
      - name: Run standalone signed repository suite
        run: bash tests/zenrepo_test.sh
      - name: Compile parsers and crash tools with sanitizers
        run: |
          mkdir -p build/sanitized
          g++ -std=c++17 -O1 -g -Wall -Wextra -Werror -Wpedantic \
            -fsanitize=address,undefined -fno-omit-frame-pointer \
            tests/package_repository_kernel_test.cpp -o build/sanitized/package-repository-kernel-test
          build/sanitized/package-repository-kernel-test build/zenrepo-test/fixtures
          g++ -std=c++17 -O1 -g -Wall -Wextra -Werror -Wpedantic \
            -fsanitize=address,undefined -fno-omit-frame-pointer \
            tests/package_transport_journal_test.cpp -o build/sanitized/package-transport-journal-test
          build/sanitized/package-transport-journal-test
          g++ -std=c++17 -O1 -g -Wall -Wextra -Werror -Wpedantic \
            -fsanitize=address,undefined -fno-omit-frame-pointer \
            tools/zenpkg_transport_fault_test.cpp -o build/sanitized/zenpkg-transport-fault-test
          build/sanitized/zenpkg-transport-fault-test build/zenov-data.img
          g++ -std=c++17 -O1 -g -Wall -Wextra -Werror -Wpedantic \
            -fsanitize=address,undefined -fno-omit-frame-pointer \
            tools/zenpkg_blkdebug_seed.cpp -o build/sanitized/zenpkg-blkdebug-seed
          rm -rf /tmp/zenpkg-blkdebug-sanitized
          build/sanitized/zenpkg-blkdebug-seed build/zenov-data.img build/hello-native-0.2.0.zpk /tmp/zenpkg-blkdebug-sanitized
          g++ -std=c++17 -O1 -g -Wall -Wextra -Werror -Wpedantic -pthread \
            -fsanitize=address,undefined -fno-omit-frame-pointer \
            tools/zenpkg_blkdebug_qemu_test.cpp -o build/sanitized/zenpkg-qmp-hmp-client
          build/sanitized/zenpkg-qmp-hmp-client --self-test
          bash -n tests/qemu_zenpkg_blkdebug_breakpoints.sh
      - name: Compile release host tools
        run: |
          g++ -std=c++17 -O2 -Wall -Wextra -Werror -Wpedantic tools/zenpkg/main.cpp -o build/zenpkg-release
          g++ -std=c++17 -O2 -Wall -Wextra -Werror -Wpedantic tools/zenrepo/main.cpp -o build/zenrepo-release
          g++ -std=c++17 -O2 -Wall -Wextra -Werror -Wpedantic tools/zenpkg_transport_fault_test.cpp -o build/zenpkg-transport-fault-release
          g++ -std=c++17 -O2 -Wall -Wextra -Werror -Wpedantic tools/zenpkg_blkdebug_seed.cpp -o build/zenpkg-blkdebug-seed-release
          g++ -std=c++17 -O2 -Wall -Wextra -Werror -Wpedantic -pthread \
            tools/zenpkg_blkdebug_qemu_test.cpp -o build/zenpkg-qmp-hmp-client-release
          build/zenpkg-qmp-hmp-client-release --self-test
          build/zenpkg-release --help
          bash tools/zenrepo/materialize_fixtures.sh /tmp/zenrepo-fixtures >/dev/null
          build/zenrepo-release inspect /tmp/zenrepo-fixtures/timestamp.zrm
          build/zenpkg-transport-fault-release build/zenov-data.img
          rm -rf /tmp/zenpkg-blkdebug-release
          build/zenpkg-blkdebug-seed-release build/zenov-data.img build/hello-native-0.2.0.zpk /tmp/zenpkg-blkdebug-release
          cmp /tmp/zenpkg-blkdebug-sanitized/sectors.env /tmp/zenpkg-blkdebug-release/sectors.env
      - name: Verify deterministic package and repository bytes
        run: |
          rm -rf /tmp/zenpkg-rebuild
          make --no-print-directory BUILD=/tmp/zenpkg-rebuild zenpkg-check
          for package in hello-native-0.1.0.zpk hello-native-0.2.0.zpk hello-native-0.3.0.zpk; do
            cmp "build/$package" "/tmp/zenpkg-rebuild/$package"
          done
          cmp build/zenpkg-manifest.json /tmp/zenpkg-rebuild/zenpkg-manifest.json
          bash tools/zenrepo/materialize_fixtures.sh /tmp/zenrepo-inventory >/dev/null
          sha256sum /tmp/zenrepo-inventory/*.zrm | sort > build/zenrepo-metadata.sha256
          test "$(wc -l < build/zenrepo-metadata.sha256)" -ge 14
          ! grep -R -E 'metadata_versions|root v[0-9]+|timestamp v[0-9]+' build/zenpkg-manifest.json docs/ZENREPO_OFFLINE_0.1.1.md
      - name: Boot ZenovOS and verify real package lifecycle
        run: |
          rm -f /tmp/zenpkg-qemu.log
          if ! make zenpkg-qemu > /tmp/zenpkg-qemu.log 2>&1; then
            tail -n 300 /tmp/zenpkg-qemu.log
            exit 1
          fi
          tail -n 160 /tmp/zenpkg-qemu.log
      - name: Boot three phases and prove journal recovery across reboot
        run: |
          rm -f /tmp/zenpkg-transport-qemu.log
          if ! make zenpkg-transport-qemu > /tmp/zenpkg-transport-qemu.log 2>&1; then
            tail -n 340 /tmp/zenpkg-transport-qemu.log
            exit 1
          fi
          tail -n 200 /tmp/zenpkg-transport-qemu.log
      - name: Boot sector-fault recovery images
        run: |
          rm -f /tmp/zenpkg-transport-fault-qemu.log
          if ! make zenpkg-transport-fault-qemu > /tmp/zenpkg-transport-fault-qemu.log 2>&1; then
            tail -n 380 /tmp/zenpkg-transport-fault-qemu.log
            exit 1
          fi
          tail -n 240 /tmp/zenpkg-transport-fault-qemu.log
      - name: Crash at proven live block I/O boundaries and reboot the same disks
        run: |
          rm -f /tmp/zenpkg-blkdebug-qemu.log
          if ! make zenpkg-blkdebug-qemu > /tmp/zenpkg-blkdebug-qemu.log 2>&1; then
            tail -n 420 /tmp/zenpkg-blkdebug-qemu.log
            exit 1
          fi
          tail -n 260 /tmp/zenpkg-blkdebug-qemu.log
      - name: Verify crash-consistency evidence
        run: |
          lifecycle=build/qemu/zenpkg/serial.log
          recovery=build/qemu/zenpkg-transport/serial.log
          faults=build/qemu/zenpkg-faults/serial.log
          blkdebug=build/qemu/zenpkg-blkdebug
          grep -Fq 'ZENPKG_TRANSPORT_COW_FAULT_MATRIX_OK cases=3173 writes=167' /tmp/zenpkg-check.log
          grep -Fq 'ZENPKG_TRANSPORT_OLD_OR_RESUMABLE_OR_NEW_OR_FAIL_CLOSED_ONLY' /tmp/zenpkg-check.log
          grep -Fq 'ZENPKG_TRANSPORT_BEGIN name=hello-native version=0.2.0 offset=0' "$lifecycle"
          grep -Fq 'ZENPKG_TRANSPORT_COMPLETE name=hello-native version=0.2.0' "$lifecycle"
          grep -Fq 'ZENPKG_TRANSPORT_PAUSED name=hello-native version=0.2.0 offset=512 expected=647' "$recovery"
          grep -Fq 'ZENPKG_TRANSPORT_JOURNAL_RECOVERED name=hello-native version=0.2.0 offset=512 expected=647' "$recovery"
          grep -Fq 'ZENPKG_TRANSPORT_RESUME name=hello-native version=0.2.0 offset=512 expected=647' "$recovery"
          grep -Fq 'ZENPKG_TRANSPORT_COMPLETE name=hello-native version=0.2.0 offset=647 expected=647' "$recovery"
          grep -Fq 'ZENPKG_TRANSPORT_JOURNAL_CLEARED name=hello-native version=0.2.0' "$recovery"
          grep -Fq 'ZENPKG_TRANSPORT_JOURNAL_INVALID_RESET' "$faults"
          grep -Fq 'ZENPKG_TRANSPORT_ADOPTED_PARTIAL name=hello-native version=0.2.0 offset=512 expected=647' "$faults"
          grep -Fq 'ZENPKG_TRANSPORT_COMMIT_RECOVERED name=hello-native version=0.2.0' "$faults"
          grep -Fq 'ZENPKG_CACHE_VERIFY_REJECTED' "$faults"
          grep -Fq 'ZENPKG_CACHE_INIT_REJECTED' "$faults"
          test "$(grep -Fc 'ZENPKG_TRANSPORT_CHUNK_COMMIT name=hello-native version=0.2.0' "$recovery")" -eq 2
          test "$(grep -Fc 'ZENPKG_BLKDEBUG_BREAKPOINT_SCENARIO_OK' "$blkdebug/summary.log")" -eq 2
          test "$(find "$blkdebug" -name 'qmp-*-arm.json' -type f | wc -l)" -eq 2
          test "$(find "$blkdebug" -name 'qmp-*-break.json' -type f | wc -l)" -eq 2
          ! grep -Eiq 'Could not|Cannot find|Error:' "$blkdebug"/qmp-*-arm.json
          grep -R -Fq '"confirmation": "arm-and-stall"' "$blkdebug"/qmp-*-break.json
          grep -R -Fq '"event": "pwritev"' "$blkdebug"/qmp-*-break.json
          test "$(grep -Fl 'ZENPKG_CACHE_VERIFY_OK objects=1 partials=0' "$blkdebug"/serial-*-recovery.log | wc -l)" -eq 2
          test "$(grep -Fl 'ZENOVFS_FSCK_OK' "$blkdebug"/serial-*-recovery.log | wc -l)" -eq 2
          test "$(find "$blkdebug" -name 'qemu-*.stderr' -type f -size +0c | wc -l)" -eq 0
          ! grep -Eq 'PANIC|ASSERT|DOUBLE FAULT|ZENPKG_TRANSPORT_RETRY_EXHAUSTED' "$lifecycle" "$recovery" "$faults" "$blkdebug"/serial-*.log
      - name: Upload ZenPkg QEMU evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zenpkg-qemu-evidence-${{ github.run_id }}
          path: |
            build/qemu/zenpkg/serial.log
            build/qemu/zenpkg/serial-*.log
            build/qemu/zenpkg/monitor-*.log
            build/qemu/zenpkg/qemu-*.stderr
            build/qemu/zenpkg-transport/serial.log
            build/qemu/zenpkg-transport/serial-*.log
            build/qemu/zenpkg-transport/monitor-*.log
            build/qemu/zenpkg-transport/qemu-*.stderr
            build/qemu/zenpkg-transport-runtime.img
            build/qemu/zenpkg-faults/serial.log
            build/qemu/zenpkg-faults/serial-*.log
            build/qemu/zenpkg-faults/monitor-*.log
            build/qemu/zenpkg-faults/qemu-*.stderr
            build/qemu/zenpkg-fault-*.img
            build/qemu/zenpkg-blkdebug/**
            build/qemu/zenpkg-blkdebug-fixtures/**
            /tmp/zenpkg-check.log
            /tmp/zenpkg-blkdebug-qemu.log
          if-no-files-found: warn
          retention-days: 14
      - name: Upload ZenPkg diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: zenpkg-diagnostics-${{ github.run_id }}
          path: |
            /tmp/zenpkg-check.log
            /tmp/zenpkg-qemu.log
            /tmp/zenpkg-transport-qemu.log
            /tmp/zenpkg-transport-fault-qemu.log
            /tmp/zenpkg-blkdebug-qemu.log
            build/qemu/zenpkg/**
            build/qemu/zenpkg-transport/**
            build/qemu/zenpkg-faults/**
            build/qemu/zenpkg-fault-*.img
            build/qemu/zenpkg-blkdebug/**
            build/qemu/zenpkg-blkdebug-fixtures/**
          if-no-files-found: ignore
