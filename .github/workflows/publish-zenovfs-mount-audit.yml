name: Publish exact ZenovFS mount audit tree

on:
  push:
    branches:
      - agent/zenovfs-mount-audit-publication
  pull_request:

concurrency:
  group: zenovfs-mount-publication
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  publish-content-addressed-blobs:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare exact reviewed base
        run: |
          set -euo pipefail
          cp .github/agent/zenovfs-mount-hardening.patch /tmp/zenovfs-mount-hardening.patch
          cp .github/agent/zenovfs-mount-hardening-fix.patch /tmp/zenovfs-mount-hardening-fix.patch
          cp .github/agent/zenovfs-mount-hardening-count.patch /tmp/zenovfs-mount-hardening-count.patch
          cp .github/agent/zenovfs-mount-qemu.patch /tmp/zenovfs-mount-qemu.patch
          cp .github/agent/zenovfs-mount-qemu-fix.patch /tmp/zenovfs-mount-qemu-fix.patch
          cp .github/agent/zenovfs-read-failure-scrub.patch /tmp/zenovfs-read-failure-scrub.patch
          cp .github/agent/zmid-update-rollback.patch /tmp/zmid-update-rollback.patch
          git switch --detach 199f98d478a7515c927c97d8fd61bdf5679e7e99
          test "$(git rev-parse HEAD)" = 199f98d478a7515c927c97d8fd61bdf5679e7e99

      - name: Apply core mount validator
        run: git apply --check /tmp/zenovfs-mount-hardening.patch && git apply /tmp/zenovfs-mount-hardening.patch

      - name: Apply host compile fix
        run: git apply --check /tmp/zenovfs-mount-hardening-fix.patch && git apply /tmp/zenovfs-mount-hardening-fix.patch

      - name: Apply exact test count
        run: git apply --check /tmp/zenovfs-mount-hardening-count.patch && git apply /tmp/zenovfs-mount-hardening-count.patch

      - name: Apply malformed-image QEMU tests
        run: git apply --check /tmp/zenovfs-mount-qemu.patch && git apply /tmp/zenovfs-mount-qemu.patch

      - name: Apply robust fixture allocation
        run: git apply --check /tmp/zenovfs-mount-qemu-fix.patch && git apply /tmp/zenovfs-mount-qemu-fix.patch

      - name: Apply failed-read disclosure fix
        run: git apply --check /tmp/zenovfs-read-failure-scrub.patch && git apply /tmp/zenovfs-read-failure-scrub.patch

      - name: Apply atomic ZMID update rollback
        run: git apply --check /tmp/zmid-update-rollback.patch && git apply /tmp/zmid-update-rollback.patch

      - name: Verify exact production file set
        run: |
          set -euo pipefail
          git diff --check
          git diff --name-only | sort > /tmp/actual-files
          cat > /tmp/expected-files <<'EOF'
          .github/workflows/antimalware.yml
          .github/workflows/zenovfs-mount-hardening.yml
          Makefile
          docs/ANTIMALWARE_0.1.1.md
          docs/INDEX.md
          docs/ZENOVFS_MOUNT_HARDENING_0.1.1.md
          kernel/parts/storage.inc
          kernel/parts/storage_format.inc
          kernel/parts/zmid_policy.inc
          tests/qemu_zenovfs_mount_reject.sh
          tests/zenovfs_mount_validation_test.cpp
          tools/zenovfs_mount_corrupt.cpp
          EOF
          sed -i 's/^          //' /tmp/expected-files
          diff -u /tmp/expected-files /tmp/actual-files

      - name: Install strict toolchain and QEMU
        run: sudo apt-get update && sudo apt-get install -y build-essential binutils openssl jq qemu-system-x86

      - name: Validate shared parser, strict build and kernel rejection
        run: |
          set -euo pipefail
          mkdir -p build/sanitized ci-logs
          g++ -std=c++17 -O1 -g -Wall -Wextra -Werror -Wpedantic \
            -fsanitize=address,undefined -fno-omit-frame-pointer \
            tests/zenovfs_mount_validation_test.cpp -o build/sanitized/zenovfs-mount-validation-test
          ASAN_OPTIONS=detect_leaks=1:halt_on_error=1 \
          UBSAN_OPTIONS=halt_on_error=1:print_stacktrace=1 \
            build/sanitized/zenovfs-mount-validation-test | tee ci-logs/zenovfs-mount-validation.log
          grep -Fq 'ZENOVFS_MOUNT_VALIDATION_TEST_OK cases=23 shared-kernel-validator=yes' ci-logs/zenovfs-mount-validation.log
          make clean check 2>&1 | tee ci-logs/zenovfs-mount-strict-build.log
          bash tests/qemu_zenovfs_mount_reject.sh \
            build/zenov-os.img build/zenov-data.img build/zenovfs-mount-corrupt \
            build/qemu/zenovfs-mount-reject
          grep -Fq 'ZENOVFS_MOUNT_QEMU_REJECTION_OK cases=6 ui_reached=0' build/qemu/zenovfs-mount-reject/summary.log

      - name: Derive and upload exact production blobs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          paths=(
            .github/workflows/antimalware.yml
            .github/workflows/zenovfs-mount-hardening.yml
            Makefile
            docs/ANTIMALWARE_0.1.1.md
            docs/INDEX.md
            docs/ZENOVFS_MOUNT_HARDENING_0.1.1.md
            kernel/parts/storage.inc
            kernel/parts/storage_format.inc
            kernel/parts/zmid_policy.inc
            tests/qemu_zenovfs_mount_reject.sh
            tests/zenovfs_mount_validation_test.cpp
            tools/zenovfs_mount_corrupt.cpp
          )
          git add "${paths[@]}"
          tree=$(git write-tree)
          printf 'parent=%s\ntree=%s\n' "$(git rev-parse HEAD)" "$tree" > /tmp/zenovfs-mount-map.txt
          for path in "${paths[@]}"; do
            expected=$(git hash-object "$path")
            mode=$(git ls-files -s -- "$path" | awk '{print $1}')
            encoded=$(base64 -w0 "$path")
            response=$(jq -cn --arg content "$encoded" '{content:$content,encoding:"base64"}' | \
              curl --fail-with-body -sS -X POST \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/git/blobs" \
                --data-binary @-)
            actual=$(jq -r '.sha' <<<"$response")
            test "$actual" = "$expected"
            printf '%s\t%s\t%s\n' "$path" "$mode" "$actual" >> /tmp/zenovfs-mount-map.txt
          done
          cat /tmp/zenovfs-mount-map.txt

      - name: Upload exact blob map and verification logs
        uses: actions/upload-artifact@v4
        with:
          name: zenovfs-mount-audit-map
          if-no-files-found: error
          path: |
            /tmp/zenovfs-mount-map.txt
            ci-logs/zenovfs-mount-validation.log
            ci-logs/zenovfs-mount-strict-build.log
            build/qemu/zenovfs-mount-reject/*.serial.log
            build/qemu/zenovfs-mount-reject/summary.log
