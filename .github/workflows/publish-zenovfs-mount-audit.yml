name: Publish exact ZenovFS mount audit tree

on:
  push:
    branches:
      - agent/zenovfs-mount-audit-publication

permissions:
  contents: write

jobs:
  publish-content-addressed-blobs:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct exact reviewed tree
        run: |
          set -euo pipefail
          cp .github/agent/zenovfs-mount-hardening.patch /tmp/zenovfs-mount-hardening.patch
          cp .github/agent/zenovfs-mount-hardening-fix.patch /tmp/zenovfs-mount-hardening-fix.patch
          git switch --detach 199f98d478a7515c927c97d8fd61bdf5679e7e99
          test "$(git rev-parse HEAD)" = 199f98d478a7515c927c97d8fd61bdf5679e7e99
          git apply --check /tmp/zenovfs-mount-hardening.patch
          git apply /tmp/zenovfs-mount-hardening.patch
          git apply --check /tmp/zenovfs-mount-hardening-fix.patch
          git apply /tmp/zenovfs-mount-hardening-fix.patch
          git diff --check
          git diff --name-only | sort > /tmp/actual-files
          cat > /tmp/expected-files <<'EOF'
          .github/workflows/zenovfs-mount-hardening.yml
          docs/INDEX.md
          docs/ZENOVFS_MOUNT_HARDENING_0.1.1.md
          kernel/parts/storage.inc
          kernel/parts/storage_format.inc
          tests/zenovfs_mount_validation_test.cpp
          EOF
          sed -i 's/^          //' /tmp/expected-files
          diff -u /tmp/expected-files /tmp/actual-files

      - name: Install strict toolchain
        run: sudo apt-get update && sudo apt-get install -y build-essential binutils openssl jq

      - name: Validate shared parser and strict build
        run: |
          set -euo pipefail
          mkdir -p build/sanitized ci-logs
          g++ -std=c++17 -O1 -g -Wall -Wextra -Werror -Wpedantic \
            -fsanitize=address,undefined -fno-omit-frame-pointer \
            tests/zenovfs_mount_validation_test.cpp -o build/sanitized/zenovfs-mount-validation-test
          ASAN_OPTIONS=detect_leaks=1:halt_on_error=1 \
          UBSAN_OPTIONS=halt_on_error=1:print_stacktrace=1 \
            build/sanitized/zenovfs-mount-validation-test | tee ci-logs/zenovfs-mount-validation.log
          grep -Fq 'ZENOVFS_MOUNT_VALIDATION_TEST_OK cases=18 shared-kernel-validator=yes' ci-logs/zenovfs-mount-validation.log
          make clean check 2>&1 | tee ci-logs/zenovfs-mount-strict-build.log

      - name: Derive and upload exact production blobs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git add \
            .github/workflows/zenovfs-mount-hardening.yml \
            docs/INDEX.md \
            docs/ZENOVFS_MOUNT_HARDENING_0.1.1.md \
            kernel/parts/storage.inc \
            kernel/parts/storage_format.inc \
            tests/zenovfs_mount_validation_test.cpp
          tree=$(git write-tree)
          printf 'parent=%s\ntree=%s\n' "$(git rev-parse HEAD)" "$tree" > /tmp/zenovfs-mount-map.txt
          for path in \
            .github/workflows/zenovfs-mount-hardening.yml \
            docs/INDEX.md \
            docs/ZENOVFS_MOUNT_HARDENING_0.1.1.md \
            kernel/parts/storage.inc \
            kernel/parts/storage_format.inc \
            tests/zenovfs_mount_validation_test.cpp; do
            expected=$(git hash-object "$path")
            encoded=$(base64 -w0 "$path")
            response=$(jq -cn --arg content "$encoded" '{content:$content,encoding:"base64"}' | \
              curl --fail-with-body -sS -X POST \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/git/blobs" \
                --data-binary @-)
            actual=$(jq -r '.sha' <<<"$response")
            test "$actual" = "$expected"
            printf '%s\t100644\t%s\n' "$path" "$actual" >> /tmp/zenovfs-mount-map.txt
          done
          cat /tmp/zenovfs-mount-map.txt

      - name: Upload exact blob map and verification logs
        uses: actions/upload-artifact@v4
        with:
          name: zenovfs-mount-audit-map
          if-no-files-found: error
          path: |
            /tmp/zenovfs-mount-map.txt
            ci-logs/zenovfs-mount-validation.log
            ci-logs/zenovfs-mount-strict-build.log
