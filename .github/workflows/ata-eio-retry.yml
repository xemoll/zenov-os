name: ZenovOS ATA EIO Retry

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
    types:
      - checks_requested
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ata-eio-retry:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      ZENOV_SOURCE_REVISION: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.ZENOV_SOURCE_REVISION }}
          fetch-depth: 1
          persist-credentials: false

      - name: Verify tested source revision
        run: |
          set -euo pipefail
          [[ "$ZENOV_SOURCE_REVISION" =~ ^[0-9a-f]{40}$ ]]
          actual_revision="$(git rev-parse HEAD)"
          test "$actual_revision" = "$ZENOV_SOURCE_REVISION"
          git cat-file -e "$actual_revision^{commit}"
          test -z "$(git status --porcelain)"
          echo "tested-source-revision=$actual_revision"

      - name: Install native toolchain and QEMU
        run: sudo apt-get update && sudo apt-get install -y build-essential binutils openssl qemu-system-x86

      - name: Verify harness syntax and rule contract
        run: |
          set -euo pipefail
          bash -n tests/qemu_ata_eio_retry.sh
          test "$(grep -Fc '[inject-error]' tests/blkdebug/ata-write-eio-once.conf)" -eq 1
          grep -Fq 'event = "pwritev"' tests/blkdebug/ata-write-eio-once.conf
          grep -Fq 'iotype = "write"' tests/blkdebug/ata-write-eio-once.conf
          grep -Fq 'errno = "5"' tests/blkdebug/ata-write-eio-once.conf
          grep -Fq 'once = "on"' tests/blkdebug/ata-write-eio-once.conf

      - name: Run reset revalidation policy under sanitizers
        run: |
          set -euo pipefail
          mkdir -p ci-logs/ata-eio
          g++ -std=c++17 -O1 -g -Wall -Wextra -Werror -Wpedantic \
            -fsanitize=address,undefined -fno-omit-frame-pointer \
            tests/storage_ata_recovery_policy_test.cpp -o ci-logs/ata-eio/storage-ata-recovery-policy-sanitized
          ci-logs/ata-eio/storage-ata-recovery-policy-sanitized | tee ci-logs/ata-eio/recovery-policy-sanitized.log
          grep -Fq 'ATA_RECOVERY_POLICY_TEST_OK cases=9' ci-logs/ata-eio/recovery-policy-sanitized.log

      - name: Build strict native system
        run: |
          set -euo pipefail
          mkdir -p ci-logs/ata-eio
          make clean check 2>&1 | tee ci-logs/ata-eio/native-check.log
          grep -Fq 'ATA_POLICY_TEST_OK cases=22' ci-logs/ata-eio/native-check.log
          grep -Fq 'ATA_RECOVERY_POLICY_TEST_OK cases=9' ci-logs/ata-eio/native-check.log
          grep -Fq 'BLOCK_RESULT_TEST_OK cases=17' ci-logs/ata-eio/native-check.log

      - name: Inject one live EIO and prove reset retry
        run: |
          set -euo pipefail
          make ata-eio-qemu 2>&1 | tee ci-logs/ata-eio/qemu.log

      - name: Verify recovery evidence
        run: |
          set -euo pipefail
          out=build/qemu/ata-eio-retry
          test -s "$out/serial.log"
          test -s "$out/summary.log"
          grep -Fq 'ATA_EIO_RETRY_QEMU_OK injected=EIO operation=write' "$out/summary.log"
          grep -Fq 'revalidations=1' "$out/summary.log"
          test "$(grep -Fc 'ATA_IO_ERROR op=write reason=' "$out/serial.log")" -eq 1
          test "$(grep -Fc 'ATA_RECOVERY_RESET_OK' "$out/serial.log")" -eq 1
          test "$(grep -Fc 'ATA_RECOVERY_REVALIDATE_OK command=identify capacity=stable' "$out/serial.log")" -eq 1
          test "$(grep -Fc 'ATA_RECOVERY_RETRY_OK op=write attempts=2' "$out/serial.log")" -eq 1
          grep -Fq 'ATA_RETRY_PROOF_OK' "$out/serial.log"
          grep -Fq 'ZENOVFS_FSCK_OK' "$out/serial.log"
          ! grep -Eq 'ATA_RECOVERY_REVALIDATE_FAILED|ATA_DEVICE_OFFLINE|KERNEL PANIC|DOUBLE FAULT|ASSERT|PS2_MOUSE_UNAVAILABLE' "$out/serial.log"
          test ! -s "$out/qemu.stderr"

      - name: Upload ATA EIO evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ata-eio-retry-${{ github.run_id }}
          path: |
            ci-logs/ata-eio/**
            build/qemu/ata-eio-retry/**
          if-no-files-found: warn
          retention-days: 14
