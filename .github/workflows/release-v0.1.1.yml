name: Publish ZenovOS v0.1.1

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/release-v0.1.1.yml"
      - "boot/**"
      - "kernel/**"
      - "user/**"
      - "packaging/**"
      - "tools/**"
      - "tests/**"
      - "Makefile"
      - "Zenov.toml"
      - "README.md"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: zenov-os-v0.1.1-release
  cancel-in-progress: false

jobs:
  publish:
    if: github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip release]')
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install native toolchain and QEMU
        run: sudo apt-get update && sudo apt-get install -y build-essential binutils qemu-system-x86 zip unzip

      - name: Verify native 0.1.1 build
        run: make clean test

      - name: Build deterministic installation package
        run: |
          bash tools/package_release.sh build/zenov-os.img build/zenov-data.img dist package
          grep -q ZENOVOS_BOOT_OK build/qemu/serial.log
          grep -q PMM_OK build/qemu/serial.log
          grep -q PAGING_OK build/qemu/serial.log
          grep -q ZENOVFS_MOUNT_OK build/qemu/serial.log
          grep -q PROCESS_ABI_0_1_1_OK build/qemu/serial.log
          grep -q APP_START_ZEX build/qemu/serial.log
          grep -q HELLO_ZEX_0_1_1_OK build/qemu/serial.log
          grep -q APP_START_ELF build/qemu/serial.log
          grep -q FILEIO_ELF_OK build/qemu/serial.log
          grep -q ZENOVFS_FSCK_OK build/qemu/serial.log
          test "$(grep -c 'APP_EXIT code=0' build/qemu/serial.log)" -ge 2
          test "$(grep -c PERSISTENCE_0_1_1_OK build/qemu/serial.log)" -ge 2
          test "$(grep -c FILE_SYSCALL_PERSIST_OK build/qemu/serial.log)" -ge 2

      - name: Create immutable v0.1.1 tag
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          if git rev-parse v0.1.1 >/dev/null 2>&1; then
            test "$(git rev-list -n1 v0.1.1)" = "$GITHUB_SHA"
          else
            git tag -a v0.1.1 "$GITHUB_SHA" -m "ZenovOS 0.1.1"
            git push origin refs/tags/v0.1.1
          fi

      - name: Write release notes
        run: |
          cat > /tmp/release-notes.md <<'NOTES'
          # ZenovOS 0.1.1

          Bootable 32-bit x86 system with paging, persistent ATA storage and isolated ZEX1/ELF32 applications.

          ## Recommended download

          - `ZenovOS-0.1.1-x86.zip` — boot image, writable ZenovFS data image, installation guide and QEMU launchers for Linux/macOS and Windows

          ## Other files

          - `ZenovOS-0.1.1-x86.img` — raw bootable FAT12 system image
          - `INSTALL.txt` — setup, memory, storage, application and controls reference
          - `SHA256SUMS.txt` — public download verification

          The ZIP contains both required images. Version 0.1.1 adds an E820 physical frame allocator, 4 KiB paging, a validated static ELF32 loader, expanded file syscalls, kernel/host ZenovFS integrity checks and persistent configuration.

          Windows PE and DOS MZ `.exe` files are not supported.
          NOTES

      - name: Publish GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view v0.1.1 --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit v0.1.1 \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "ZenovOS 0.1.1" \
              --notes-file /tmp/release-notes.md \
              --latest
            while IFS= read -r asset; do
              [[ -z "$asset" ]] || gh release delete-asset v0.1.1 "$asset" --repo "$GITHUB_REPOSITORY" --yes
            done < <(gh release view v0.1.1 --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name')
          else
            gh release create v0.1.1 \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "ZenovOS 0.1.1" \
              --notes-file /tmp/release-notes.md \
              --latest
          fi
          gh release upload v0.1.1 \
            dist/ZenovOS-0.1.1-x86.img \
            dist/ZenovOS-0.1.1-x86.zip \
            dist/INSTALL.txt \
            dist/SHA256SUMS.txt \
            --repo "$GITHUB_REPOSITORY"
          test "$(gh release view v0.1.1 --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets | length')" -eq 4

      - name: Record verified release publication
        run: |
          set -euo pipefail
          mkdir -p docs/releases
          cat > docs/releases/v0.1.1.md <<STATUS
          # ZenovOS v0.1.1 publication status

          Status: **published and verified**

          Source commit: \`$GITHUB_SHA\`
          Workflow run: \`$GITHUB_RUN_ID\`
          Target: \`i686-zenov-none\`
          Python runtime: \`false\`
          Memory: \`E820 PMM / 4 KiB paging\`
          Persistent storage: \`ATA PIO / ZenovFS1\`
          Application ABI: \`ZEX1 + static ELF32 ring 3 / INT 0x80\`

          Public installation assets:

          - \`ZenovOS-0.1.1-x86.img\`
          - \`ZenovOS-0.1.1-x86.zip\`
          - \`INSTALL.txt\`
          - \`SHA256SUMS.txt\`

          The ZIP contains the boot image, writable data image, installation guide and QEMU launchers. Kernel symbols, maps, logs, manifests, native app files and screenshots remain internal CI evidence.
          STATUS
          git add docs/releases/v0.1.1.md
          git commit -m "docs: record v0.1.1 release publication [skip release]"
          git push origin HEAD:main

      - name: Upload CI evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zenov-os-v0.1.1-paging-elf-evidence
          if-no-files-found: error
          path: |
            dist/
            build/KERNEL.BIN
            build/kernel.elf
            build/kernel.map
            build/zenov-data.img
            build/HELLO.ZEX
            build/hello-user.elf
            build/FILEIO.ELF
            build/build-manifest.json
            build/qemu/serial.log
            build/qemu/serial-phase1.log
            build/qemu/serial-phase2.log
            build/qemu/screenshot.ppm
