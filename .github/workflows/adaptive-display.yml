name: Apply reviewed ZCAP1 patch

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply-zcap:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Verify and apply exact ZCAP1 source patch
        run: |
          set -euxo pipefail
          git merge-base --is-ancestor df1d3dc7128282219c962554dfe7932d37ea40e3 HEAD
          cat .github/agent/zcap-df1-*.b64 | base64 --decode --ignore-garbage > /tmp/zcap-df1.patch.gz
          test "$(sha256sum /tmp/zcap-df1.patch.gz | cut -d' ' -f1)" = "f365af2a92d1a22f292f03ac8ec6a56ee64f810276bfc5d1d13d08df0accfa91"
          gzip -t /tmp/zcap-df1.patch.gz
          gzip -dc /tmp/zcap-df1.patch.gz > /tmp/zcap-df1.patch
          test "$(sha256sum /tmp/zcap-df1.patch | cut -d' ' -f1)" = "075085ece775452ee978cd16902b1d4eb5f37d9222027143187209c013eaa5ae"
          git apply --check /tmp/zcap-df1.patch
          git apply --index /tmp/zcap-df1.patch
          git checkout df1d3dc7128282219c962554dfe7932d37ea40e3 -- .github/workflows/adaptive-display.yml
          rm -f .github/agent/zcap-df1-*.b64
          git add -A
          git diff --cached --check
          git config user.name "zenov-os-ci"
          git config user.email "zenov-os-ci@users.noreply.github.com"
          git commit -m "security: move syscall authority into signed ZCAP1 policy"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
