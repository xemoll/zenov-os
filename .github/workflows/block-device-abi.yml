name: ZenovOS Typed Block Device ABI

on:
  push:
    branches:
      - main
    paths:
      - 'GNUmakefile'
      - 'kernel/kernel.cpp'
      - 'kernel/parts/storage*.inc'
      - 'tests/storage_block_result_test.cpp'
      - 'tests/storage_block_device_test.cpp'
      - 'tests/qemu_block_status.sh'
      - '.github/workflows/block-device-abi.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'GNUmakefile'
      - 'kernel/kernel.cpp'
      - 'kernel/parts/storage*.inc'
      - 'tests/storage_block_result_test.cpp'
      - 'tests/storage_block_device_test.cpp'
      - 'tests/qemu_block_status.sh'
      - '.github/workflows/block-device-abi.yml'
  merge_group:
    types:
      - checks_requested
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typed-block-device:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      ZENOV_SOURCE_REVISION: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.ZENOV_SOURCE_REVISION }}
          fetch-depth: 1
          persist-credentials: false

      - name: Verify exact source revision
        run: |
          set -euo pipefail
          [[ "$ZENOV_SOURCE_REVISION" =~ ^[0-9a-f]{40}$ ]]
          actual_revision="$(git rev-parse HEAD)"
          test "$actual_revision" = "$ZENOV_SOURCE_REVISION"
          test -z "$(git status --porcelain)"
          echo "tested-source-revision=$actual_revision"

      - name: Install native toolchain and QEMU
        run: sudo apt-get update && sudo apt-get install -y build-essential binutils openssl qemu-system-x86

      - name: Verify typed source contract
        run: |
          set -euo pipefail
          grep -Fq 'BlockResult (*read_sector)(uint32_t, uint8_t*);' kernel/parts/storage_block_device.inc
          grep -Fq 'BlockResult (*write_sector)(uint32_t, const uint8_t*);' kernel/parts/storage_block_device.inc
          grep -Fq 'BlockIoState zfs_io_state = block_io_state_initial();' kernel/parts/storage.inc
          grep -Fq 'ata0.read_sector = ata2_read_result;' kernel/parts/storage_ata_deadline_init.inc
          grep -Fq 'ata0.write_sector = ata2_write_result;' kernel/parts/storage_ata_deadline_init.inc
          ! grep -Fq 'bool (*read_sector)' kernel/parts/storage.inc
          ! grep -Fq 'bool (*write_sector)' kernel/parts/storage.inc
          ! grep -Fq 'wait_not_busy()' kernel/parts/storage.inc
          ! grep -Fq 'wait_drq()' kernel/parts/storage.inc
          ! grep -Fq 'ata_read_sector' kernel/parts/storage.inc
          ! grep -Fq 'ata_write_sector' kernel/parts/storage.inc
          ! grep -Fq 'ata2_read_sector' kernel/parts/storage_ata_deadline_io.inc
          ! grep -Fq 'ata2_write_sector' kernel/parts/storage_ata_deadline_io.inc
          ! grep -R -F 'ata0.read_sector(' kernel/parts
          ! grep -R -F 'ata0.write_sector(' kernel/parts
          echo 'BLOCK_DEVICE_SOURCE_CONTRACT_OK typed=1 legacy=0'

      - name: Run typed contracts under sanitizers
        run: |
          set -euo pipefail
          mkdir -p ci-logs/block-device
          flags=(-std=c++17 -O1 -g -Wall -Wextra -Werror -Wpedantic -fsanitize=address,undefined -fno-omit-frame-pointer)
          g++ "${flags[@]}" tests/storage_block_result_test.cpp -o ci-logs/block-device/storage-block-result-sanitized
          g++ "${flags[@]}" tests/storage_block_device_test.cpp -o ci-logs/block-device/storage-block-device-sanitized
          ci-logs/block-device/storage-block-result-sanitized | tee ci-logs/block-device/block-result.log
          ci-logs/block-device/storage-block-device-sanitized | tee ci-logs/block-device/block-device.log
          grep -Fq 'BLOCK_RESULT_TEST_OK cases=17' ci-logs/block-device/block-result.log
          grep -Fq 'BLOCK_DEVICE_TEST_OK cases=24 requests=12 completed=3 failed=9' ci-logs/block-device/block-device.log

      - name: Build strict native system
        run: |
          set -euo pipefail
          make clean check 2>&1 | tee ci-logs/block-device/native-check.log
          grep -Fq 'BLOCK_RESULT_TEST_OK cases=17' ci-logs/block-device/native-check.log
          grep -Fq 'BLOCK_DEVICE_TEST_OK cases=24 requests=12 completed=3 failed=9' ci-logs/block-device/native-check.log
          grep -Fq 'ATA_POLICY_TEST_OK cases=22' ci-logs/block-device/native-check.log
          grep -Fq 'ATA_RECOVERY_POLICY_TEST_OK cases=9' ci-logs/block-device/native-check.log

      - name: Boot and inspect typed boundary
        run: |
          set -euo pipefail
          make block-status-qemu 2>&1 | tee ci-logs/block-device/qemu.log

      - name: Verify runtime evidence
        run: |
          set -euo pipefail
          out=build/qemu/block-status
          grep -Fq 'BLOCK_STATUS_QEMU_OK command="disk status" typed-results=2 typed-abi=1 counters=consistent' "$out/summary.log"
          grep -Fq 'BLOCK_DEVICE_TYPED_ABI_READY version=1' "$out/serial.log"
          grep -Fq 'BLOCK_RESULT_API_OK version=2' "$out/serial.log"
          grep -Fq 'BLOCK_DEVICE_TYPED_ABI_OK version=1' "$out/serial.log"
          grep -Fq 'BLOCK_DEVICE_COUNTERS_OK' "$out/serial.log"
          grep -Fq 'BLOCK_DEVICE_STATUS_OK' "$out/serial.log"
          ! grep -Eq 'BLOCK_DEVICE_COUNTERS_INVALID|KERNEL PANIC|DOUBLE FAULT|ASSERT|PS2_MOUSE_UNAVAILABLE' "$out/serial.log"
          test ! -s "$out/qemu.stderr"

      - name: Upload typed block evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: typed-block-device-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ci-logs/block-device/**
            build/qemu/block-status/**
          if-no-files-found: warn
          retention-days: 14
