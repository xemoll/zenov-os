name: Publish ZenovOS v0.1.0

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/release-v0.1.0.yml"
      - "boot/**"
      - "kernel/**"
      - "tools/**"
      - "tests/**"
      - "Makefile"
      - "Zenov.toml"
      - "README.md"
      - "docs/screenshots/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: zenov-os-v0.1.0-release
  cancel-in-progress: false

jobs:
  publish:
    if: github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip release]')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install native toolchain and QEMU
        run: sudo apt-get update && sudo apt-get install -y build-essential binutils qemu-system-x86 zip

      - name: Verify native 0.1.0 build
        run: make clean test

      - name: Prepare installation package
        run: |
          set -euo pipefail
          rm -rf dist package
          mkdir -p dist package
          cp build/zenov-os.img dist/ZenovOS-0.1.0-x86.img
          cp dist/ZenovOS-0.1.0-x86.img package/
          cat > dist/INSTALL.txt <<'INSTALL'
          ZenovOS 0.1.0
          =================

          ZenovOS 0.1.0 is distributed as a bootable 1.44 MiB x86 floppy image.
          It does not yet install itself to a hard disk.

          QEMU
          -----
          qemu-system-i386 -drive file=ZenovOS-0.1.0-x86.img,format=raw,if=floppy -boot a -m 32M

          Virtual machine
          ---------------
          Create a 32-bit x86 virtual machine, enable legacy BIOS boot, attach
          ZenovOS-0.1.0-x86.img as the first floppy drive, then boot from it.

          Physical media
          --------------
          The image may be written to a 1.44 MiB floppy disk or used with firmware
          that supports USB floppy emulation. Double-check the destination device.

          Linux example:
          sudo dd if=ZenovOS-0.1.0-x86.img of=/dev/fd0 bs=64K conv=fsync status=progress

          Verification
          ------------
          sha256sum -c SHA256SUMS.txt
          INSTALL
          cp dist/INSTALL.txt package/
          (
            cd package
            zip -9 ../dist/ZenovOS-0.1.0-x86.zip ZenovOS-0.1.0-x86.img INSTALL.txt
          )
          (
            cd dist
            sha256sum ZenovOS-0.1.0-x86.img ZenovOS-0.1.0-x86.zip > SHA256SUMS.txt
          )
          test "$(stat -c%s dist/ZenovOS-0.1.0-x86.img)" -eq 1474560
          grep -q ZENOVOS_BOOT_OK build/qemu/serial.log
          grep -q ZENOVOS_UI_READY build/qemu/serial.log
          grep -q 'zenov> ' build/qemu/serial.log

      - name: Point v0.1.0 tag to verified main
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git tag -f -a v0.1.0 "$GITHUB_SHA" -m "ZenovOS 0.1.0"
          git push origin refs/tags/v0.1.0 --force

      - name: Write release notes
        run: |
          cat > /tmp/release-notes.md <<'NOTES'
          # ZenovOS 0.1.0

          Bootable x86 system image for QEMU, virtual machines and compatible floppy media.

          ## Download

          - `ZenovOS-0.1.0-x86.zip` — image and installation instructions
          - `ZenovOS-0.1.0-x86.img` — raw bootable floppy image
          - `INSTALL.txt` — setup instructions
          - `SHA256SUMS.txt` — download verification

          ZenovOS 0.1.0 currently boots directly from the image. It does not yet include a hard-disk installer.
          NOTES

      - name: Replace GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view v0.1.0 --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit v0.1.0 \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "ZenovOS 0.1.0" \
              --notes-file /tmp/release-notes.md \
              --latest
            while IFS= read -r asset; do
              [[ -z "$asset" ]] || gh release delete-asset v0.1.0 "$asset" --repo "$GITHUB_REPOSITORY" --yes
            done < <(gh release view v0.1.0 --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name')
          else
            gh release create v0.1.0 \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "ZenovOS 0.1.0" \
              --notes-file /tmp/release-notes.md \
              --latest
          fi
          gh release upload v0.1.0 \
            dist/ZenovOS-0.1.0-x86.img \
            dist/ZenovOS-0.1.0-x86.zip \
            dist/INSTALL.txt \
            dist/SHA256SUMS.txt \
            --repo "$GITHUB_REPOSITORY"

      - name: Record verified release publication
        run: |
          set -euo pipefail
          mkdir -p docs/releases
          cat > docs/releases/v0.1.0.md <<STATUS
          # ZenovOS v0.1.0 publication status

          Status: **published and verified**

          Source commit: \`$GITHUB_SHA\`
          Workflow run: \`$GITHUB_RUN_ID\`
          Target: \`i686-zenov-none\`
          Python runtime: \`false\`

          Public installation assets:

          - \`ZenovOS-0.1.0-x86.img\`
          - \`ZenovOS-0.1.0-x86.zip\`
          - \`INSTALL.txt\`
          - \`SHA256SUMS.txt\`

          Kernel symbols, maps, logs, manifests and screenshots remain internal CI evidence and are not published as end-user release downloads.
          STATUS
          git add docs/releases/v0.1.0.md
          git commit -m "docs: record v0.1.0 release publication [skip release]"
          git push origin HEAD:main

      - name: Upload CI evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zenov-os-v0.1.0-ci-evidence
          if-no-files-found: error
          path: |
            dist/
            build/KERNEL.BIN
            build/kernel.elf
            build/kernel.map
            build/build-manifest.json
            build/qemu/serial.log
            build/qemu/screenshot.ppm
