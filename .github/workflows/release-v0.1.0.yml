name: Publish ZenovOS v0.1.0

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/release-v0.1.0.yml"
      - "boot/**"
      - "kernel/**"
      - "tools/**"
      - "tests/**"
      - "Makefile"
      - "Zenov.toml"
      - "README.md"
      - "docs/screenshots/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: zenov-os-v0.1.0-release
  cancel-in-progress: false

jobs:
  publish:
    if: github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip release]')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install native toolchain and QEMU
        run: sudo apt-get update && sudo apt-get install -y build-essential binutils qemu-system-x86 zip unzip

      - name: Verify native 0.1.0 build
        run: make clean test

      - name: Prepare installation package
        run: |
          set -euo pipefail
          rm -rf dist package
          mkdir -p dist package
          cp build/zenov-os.img dist/ZenovOS-0.1.0-x86.img
          cp dist/ZenovOS-0.1.0-x86.img package/

          cat > dist/INSTALL.txt <<'INSTALL'
          ZenovOS 0.1.0 — installation and boot guide
          =================================================

          ZenovOS 0.1.0 is a bootable 1.44 MiB x86 FAT12 image. This version
          runs directly from the image and does not install itself to a hard disk.

          QUICK START
          -----------
          1. Extract ZenovOS-0.1.0-x86.zip.
          2. Install QEMU if it is not already available.
          3. Run ./run-qemu.sh on Linux/macOS or run-qemu.cmd on Windows.

          QEMU — MANUAL COMMAND
          ---------------------
          qemu-system-i386 -drive file=ZenovOS-0.1.0-x86.img,format=raw,if=floppy -boot a -m 32M

          VIRTUALBOX
          ----------
          1. Create a new 32-bit "Other/Unknown" virtual machine.
          2. Use legacy BIOS, one CPU and at least 32 MiB RAM.
          3. Add a floppy controller and attach ZenovOS-0.1.0-x86.img.
          4. Put the floppy device first in the boot order and start the VM.

          PHYSICAL FLOPPY
          ---------------
          The image can be written to a real 1.44 MiB floppy. Check the destination
          device carefully before writing; the command overwrites it completely.

          Linux example:
          sudo dd if=ZenovOS-0.1.0-x86.img of=/dev/fd0 bs=64K conv=fsync status=progress

          VERIFY THE DOWNLOAD
          -------------------
          Linux/macOS:
          sha256sum -c SHA256SUMS.txt

          Windows PowerShell:
          Get-FileHash .\ZenovOS-0.1.0-x86.img -Algorithm SHA256
          Get-FileHash .\ZenovOS-0.1.0-x86.zip -Algorithm SHA256

          SYSTEM CONTROLS
          ---------------
          F1       command reference
          F2       system details
          F3       built-in files
          F4       home dashboard
          Tab      command completion
          Esc      clear current input
          Up/Down  command history
          INSTALL

          cat > package/run-qemu.sh <<'SH'
          #!/usr/bin/env sh
          set -eu
          base_dir=$(CDPATH= cd -- "$(dirname -- "$0")" && pwd)
          image="$base_dir/ZenovOS-0.1.0-x86.img"
          command -v qemu-system-i386 >/dev/null 2>&1 || {
            echo "qemu-system-i386 was not found. Install QEMU and try again." >&2
            exit 1
          }
          exec qemu-system-i386 -drive "file=$image,format=raw,if=floppy" -boot a -m 32M
          SH
          chmod +x package/run-qemu.sh

          cat > package/run-qemu.cmd <<'CMD'
          @echo off
          setlocal
          set "IMAGE=%~dp0ZenovOS-0.1.0-x86.img"
          where qemu-system-i386.exe >nul 2>nul
          if errorlevel 1 (
            echo qemu-system-i386.exe was not found. Install QEMU and add it to PATH.
            exit /b 1
          )
          qemu-system-i386.exe -drive file="%IMAGE%",format=raw,if=floppy -boot a -m 32M
          CMD

          cp dist/INSTALL.txt package/
          TZ=UTC touch -t 202601010000 package/ZenovOS-0.1.0-x86.img package/INSTALL.txt package/run-qemu.sh package/run-qemu.cmd
          (
            cd package
            zip -X -9 ../dist/ZenovOS-0.1.0-x86.zip \
              ZenovOS-0.1.0-x86.img INSTALL.txt run-qemu.sh run-qemu.cmd
          )
          (
            cd dist
            sha256sum ZenovOS-0.1.0-x86.img ZenovOS-0.1.0-x86.zip > SHA256SUMS.txt
          )

          test "$(stat -c%s dist/ZenovOS-0.1.0-x86.img)" -eq 1474560
          unzip -Z1 dist/ZenovOS-0.1.0-x86.zip | sort > /tmp/package-files.txt
          printf '%s\n' INSTALL.txt ZenovOS-0.1.0-x86.img run-qemu.cmd run-qemu.sh | sort > /tmp/expected-files.txt
          diff -u /tmp/expected-files.txt /tmp/package-files.txt
          grep -q ZENOVOS_BOOT_OK build/qemu/serial.log
          grep -q ZENOVOS_UI_READY build/qemu/serial.log
          grep -q 'COMMAND REFERENCE' build/qemu/serial.log
          grep -q 'SYSTEM STATUS' build/qemu/serial.log
          grep -q 'zenov> ' build/qemu/serial.log

      - name: Point v0.1.0 tag to verified main
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git tag -f -a v0.1.0 "$GITHUB_SHA" -m "ZenovOS 0.1.0"
          git push origin refs/tags/v0.1.0 --force

      - name: Write release notes
        run: |
          cat > /tmp/release-notes.md <<'NOTES'
          # ZenovOS 0.1.0

          Bootable x86 system image for QEMU, VirtualBox and compatible floppy media.

          ## Recommended download

          - `ZenovOS-0.1.0-x86.zip` — boot image, installation guide and QEMU launchers for Linux/macOS and Windows

          ## Other files

          - `ZenovOS-0.1.0-x86.img` — raw bootable FAT12 image
          - `INSTALL.txt` — setup and controls reference
          - `SHA256SUMS.txt` — download verification

          ZenovOS 0.1.0 boots directly from the image. It does not yet install to a hard disk.
          NOTES

      - name: Replace GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view v0.1.0 --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit v0.1.0 \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "ZenovOS 0.1.0" \
              --notes-file /tmp/release-notes.md \
              --latest
            while IFS= read -r asset; do
              [[ -z "$asset" ]] || gh release delete-asset v0.1.0 "$asset" --repo "$GITHUB_REPOSITORY" --yes
            done < <(gh release view v0.1.0 --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name')
          else
            gh release create v0.1.0 \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "ZenovOS 0.1.0" \
              --notes-file /tmp/release-notes.md \
              --latest
          fi
          gh release upload v0.1.0 \
            dist/ZenovOS-0.1.0-x86.img \
            dist/ZenovOS-0.1.0-x86.zip \
            dist/INSTALL.txt \
            dist/SHA256SUMS.txt \
            --repo "$GITHUB_REPOSITORY"

      - name: Record verified release publication
        run: |
          set -euo pipefail
          mkdir -p docs/releases
          cat > docs/releases/v0.1.0.md <<STATUS
          # ZenovOS v0.1.0 publication status

          Status: **published and verified**

          Source commit: \`$GITHUB_SHA\`
          Workflow run: \`$GITHUB_RUN_ID\`
          Target: \`i686-zenov-none\`
          Python runtime: \`false\`

          Public installation assets:

          - \`ZenovOS-0.1.0-x86.img\`
          - \`ZenovOS-0.1.0-x86.zip\`
          - \`INSTALL.txt\`
          - \`SHA256SUMS.txt\`

          The ZIP contains the boot image, installation guide and QEMU launchers for Linux/macOS and Windows. Kernel symbols, maps, logs, manifests and screenshots remain internal CI evidence.
          STATUS
          git add docs/releases/v0.1.0.md
          git commit -m "docs: record v0.1.0 release publication [skip release]"
          git push origin HEAD:main

      - name: Upload CI evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zenov-os-v0.1.0-ci-evidence
          if-no-files-found: error
          path: |
            dist/
            build/KERNEL.BIN
            build/kernel.elf
            build/kernel.map
            build/build-manifest.json
            build/qemu/serial.log
            build/qemu/screenshot.ppm
