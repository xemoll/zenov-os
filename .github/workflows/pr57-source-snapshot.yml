name: PR57 exact source snapshot

on:
  push:
    branches:
      - agent/pr57-source-snapshot

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Verify exact merge parent
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD^)" = "9b6ff0dd700f51d3ccb927662db9383a12c805c8"
      - name: Archive exact merged source
        run: |
          set -euo pipefail
          git archive --format=zip --output=zenov-os-pr57-merge-source.zip 9b6ff0dd700f51d3ccb927662db9383a12c805c8
          sha256sum zenov-os-pr57-merge-source.zip > zenov-os-pr57-merge-source.zip.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: zenov-os-pr57-merge-source
          path: |
            zenov-os-pr57-merge-source.zip
            zenov-os-pr57-merge-source.zip.sha256
          if-no-files-found: error
          retention-days: 7
