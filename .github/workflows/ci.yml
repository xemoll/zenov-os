name: ZenovOS 0.1.0 CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  native-build-and-boot:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install native toolchain and QEMU
        run: sudo apt-get update && sudo apt-get install -y build-essential binutils qemu-system-x86
      - name: Verify no Python source remains
        run: test -z "$(find . -name '*.py' -print)"
      - name: Verify source encoding
        run: |
          while IFS= read -r file; do
            iconv -f UTF-8 -t UTF-8 "$file" >/dev/null
          done < <(find kernel tools boot -type f \( -name '*.cpp' -o -name '*.inc' -o -name '*.S' -o -name '*.zv' -o -name '*.ld' \) -print)
      - name: Run native checks and build
        run: |
          mkdir -p ci-logs
          set -o pipefail
          make clean check 2>&1 | tee ci-logs/native-build.log
      - name: Boot protected-mode kernel in QEMU
        run: make qemu
      - name: Verify deterministic rebuild
        run: make deterministic
      - name: Inspect kernel format
        run: |
          readelf -h build/kernel.elf
          test "$(stat -c%s build/BOOT.BIN)" -eq 512
          test "$(stat -c%s build/KERNEL.BIN)" -le 61440
          grep -q ZENOVOS_BOOT_OK build/qemu/serial.log
          grep -q 'Kernel online' build/qemu/serial.log
          grep -q 'zenov> ' build/qemu/serial.log
      - name: Upload verified 0.1.0 artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zenov-os-0.1.0-deep
          if-no-files-found: error
          path: |
            build/BOOT.BIN
            build/KERNEL.BIN
            build/kernel.elf
            build/kernel.map
            build/zenov-os.img
            build/build-manifest.json
            build/qemu/serial.log
            build/qemu/screenshot.ppm
            ci-logs/native-build.log
