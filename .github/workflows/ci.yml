name: ZenovOS 0.1.1 CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  native-build-and-boot:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      ZENOV_SOURCE_REVISION: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Verify tested source revision
        run: |
          [[ "$ZENOV_SOURCE_REVISION" =~ ^[0-9a-f]{40}$ ]]
          git cat-file -e "$ZENOV_SOURCE_REVISION^{commit}"
          echo "tested-source-revision=$ZENOV_SOURCE_REVISION"

      - name: Install native toolchain and QEMU
        run: sudo apt-get update && sudo apt-get install -y build-essential binutils openssl qemu-system-x86 zip unzip

      - name: Verify no Python source remains
        run: test -z "$(find . -name '*.py' -print)"

      - name: Verify source encoding
        run: |
          while IFS= read -r file; do
            iconv -f UTF-8 -t UTF-8 "$file" >/dev/null
          done < <(find kernel user tools boot packaging security -type f \( -name '*.cpp' -o -name '*.hpp' -o -name '*.inc' -o -name '*.S' -o -name '*.zv' -o -name '*.ld' -o -name '*.sh' -o -name '*.txt' -o -name '*.pem' \) -print)

      - name: Run native checks and audit COW fault matrix
        run: |
          mkdir -p ci-logs
          set -o pipefail
          make clean check 2>&1 | tee ci-logs/native-build.log

      - name: Boot desktop and nine recovery/fail-closed phases
        run: make qemu

      - name: Verify Files browser navigation and preview
        run: bash tests/qemu_files_ui.sh build/zenov-os.img build/zenov-data.img build/qemu-files-ui

      - name: Verify deterministic installation package and provenance
        run: |
          bash tools/package_release.sh build/zenov-os.img build/zenov-data.img dist package
          bash tools/package_release.sh build/zenov-os.img build/zenov-data.img dist-rebuild package-rebuild
          cmp dist/ZenovOS-0.1.1-x86.img dist-rebuild/ZenovOS-0.1.1-x86.img
          cmp dist/ZenovOS-0.1.1-x86.zip dist-rebuild/ZenovOS-0.1.1-x86.zip
          cmp dist/SHA256SUMS.txt dist-rebuild/SHA256SUMS.txt
          cmp dist/SOURCE-REVISION.txt dist-rebuild/SOURCE-REVISION.txt
          grep -qx "$ZENOV_SOURCE_REVISION" dist/SOURCE-REVISION.txt
          unzip -p dist/ZenovOS-0.1.1-x86.zip SOURCE-REVISION.txt | grep -qx "$ZENOV_SOURCE_REVISION"
          unzip -p dist/ZenovOS-0.1.1-x86.zip ZenovOS-0.1.1-data.img | cmp - build/zenov-data.img

      - name: Verify deterministic system rebuild
        run: make deterministic

      - name: Inspect audit fault-injection and runtime evidence
        run: |
          readelf -h build/kernel.elf
          for app in build/FILEIO.ELF build/ARGS.ELF build/CONSOLE.ELF build/PROTECT.ELF build/KACCESS.ELF; do
            readelf -h "$app"
            readelf -l "$app"
          done
          test "$(stat -c%s build/BOOT.BIN)" -eq 512
          test "$(stat -c%s build/KERNEL.BIN)" -le 524288
          test "$(stat -c%s build/zenov-data.img)" -eq 16777216
          test -x build/zenovfs-audit-verify
          test -x build/zenovfs-audit-fault-test
          for image in \
            build/qemu/zenov-data-runtime.img \
            build/qemu/zenov-data-audit-tampered.img \
            build/qemu/zenov-data-audit-old-recovery.img \
            build/qemu/zenov-data-audit-new-recovery.img \
            build/qemu/zenov-data-audit-corrupt.img \
            build/qemu/zenov-data-zcap-corrupt.img \
            build/qemu/zenov-data-zmid-corrupt.img; do test -s "$image"; done
          awk '
            /ZENOV_AUDIT_COW_FAULT_MATRIX_OK/ {
              scenario=""; cases=0; old=0; new=0; fail_closed=0;
              for (i=1; i<=NF; ++i) {
                split($i, field, "=");
                if (field[1] == "scenario") scenario=field[2];
                else if (field[1] == "cases") cases=field[2] + 0;
                else if (field[1] == "old") old=field[2] + 0;
                else if (field[1] == "new") new=field[2] + 0;
                else if (field[1] == "fail_closed") fail_closed=field[2] + 0;
              }
              if (cases != 831 || old + new + fail_closed != cases || old == 0 || new == 0 || fail_closed == 0) exit 2;
              seen[scenario]=1;
            }
            END {
              if (!seen["empty-to-one"] || !seen["full-ring-rotation"]) exit 3;
            }
          ' ci-logs/native-build.log
          grep -q 'ZENOV_AUDIT_COW_FAULT_INJECTION_OK total_cases=1662' ci-logs/native-build.log
          grep -q ZENOV_AUDIT_COW_OLD_OR_NEW_OR_FAIL_CLOSED_ONLY ci-logs/native-build.log
          build/zenovfs-audit-verify build/qemu/zenov-data-runtime.img --require-nonempty
          if build/zenovfs-audit-verify build/qemu/zenov-data-audit-tampered.img --require-nonempty; then
            echo 'tampered persistent audit image unexpectedly verified' >&2
            exit 1
          fi
          for db in build/zenovguard-v3.zgdb build/zenovguard-v4.zgdb build/zenovguard-tampered.zgdb build/zenovguard-wrong-key.zgdb; do test -s "$db"; done
          test -s build/qemu/screenshot.ppm
          test -s build/qemu-files-ui/files-root.ppm
          test -s build/qemu-files-ui/files-apps.ppm
          test -s build/qemu-files-ui/files-preview.ppm
          grep -q UI_FILES_BROWSER_OK build/qemu-files-ui/serial.log
          grep -q UI_KEYBOARD_NAV_OK build/qemu-files-ui/serial.log
          grep -q UI_FILES_NAV_OK build/qemu-files-ui/serial.log
          grep -q UI_FILES_PREVIEW_OK build/qemu-files-ui/serial.log
          grep -q ZENOVOS_BOOT_OK build/qemu/serial.log
          grep -q PMM_STRESS_OK build/qemu/serial.log
          grep -q PMM_OK build/qemu/serial.log
          grep -q HEAP_REUSE_OK build/qemu/serial.log
          grep -q HEAP_COALESCE_OK build/qemu/serial.log
          grep -q HEAP_INVALID_FREE_BLOCKED build/qemu/serial.log
          grep -q HEAP_STRESS_OK build/qemu/serial.log
          grep -q PAGING_OK build/qemu/serial.log
          grep -q USER_WINDOW_SCRUB_OK build/qemu/serial.log
          grep -q USER_WINDOW_RUNTIME_SCRUB_OK build/qemu/serial.log
          test "$(grep -c USER_WINDOW_RUNTIME_SCRUB_OK build/qemu/serial.log)" -ge 7
          grep -q ELF_WX_POLICY_OK build/qemu/serial.log
          grep -q ZENOVFS_MOUNT_OK build/qemu/serial.log
          grep -q PROCESS_ABI_0_1_1_OK build/qemu/serial.log
          grep -q ZENOV_GUARD_AUDIT_SELFTEST_OK build/qemu/serial.log
          test "$(grep -c ZENOV_GUARD_AUDIT_REPLAY_OK build/qemu/serial.log)" -ge 5
          grep -Eq 'ZENOV_GUARD_AUDIT_REPLAY_OK count=[1-9][0-9]*' build/qemu/serial-phase2.log
          grep -q 'ZENOV_GUARD_AUDIT_REPLAY_OK count=0 next=1' build/qemu/serial-audit-old-recovery.log
          grep -q 'ZENOV_GUARD_AUDIT_REPLAY_OK count=1 next=2' build/qemu/serial-audit-new-recovery.log
          test "$(grep -c ZENOV_GUARD_AUDIT_VERIFY_OK build/qemu/serial.log)" -ge 12
          grep -q ZENOV_GUARD_AUDIT_READY build/qemu/serial.log
          grep -q ZENOV_GUARD_AUDIT_INVALID build/qemu/serial-audit-corrupt.log
          grep -q 'Persistent ZenovGuard audit journal validation failed.' build/qemu/serial-audit-corrupt.log
          ! grep -q ZENOVOS_UI_READY build/qemu/serial-audit-corrupt.log
          ! grep -q ZENOV_GUARD_AUDIT_APPEND_FAILED build/qemu/serial.log
          ! grep -q ZENOV_GUARD_AUDIT_ENFORCEMENT_LOCK build/qemu/serial.log
          test "$(grep -c ZENOVFS_INTERRUPTED_WRITE_RECOVERED build/qemu/serial.log)" -ge 3
          grep -q ZENOV_GUARD_SELFTEST_OK build/qemu/serial.log
          grep -q ZENOV_GUARD_TRUST_BASELINE_OK build/qemu/serial.log
          grep -q ZENOV_GUARD_PROTECTED_PATH_TEST_OK build/qemu/serial.log
          grep -q 'ZGDB_ROOT_KEY_OK id=6f788074c018f5aa' build/qemu/serial.log
          test "$(grep -c ZGDB_PSS_SIGNATURE_OK build/qemu/serial.log)" -ge 5
          grep -q 'ZGDB_POLICY_VERSION_OK version=3' build/qemu/serial.log
          grep -q 'ZGDB_POLICY_VERSION_OK version=4' build/qemu/serial.log
          grep -q 'ZGDB_KEY_REJECTED reason=unknown-key' build/qemu/serial.log
          grep -q ZGDB_TAMPER_REJECTED build/qemu/serial.log
          grep -q 'ZGDB_ATOMIC_UPDATE_OK version=4' build/qemu/serial.log
          grep -q ZGDB_ROLLBACK_REJECTED build/qemu/serial.log
          test "$(grep -c ZGDB_REVOCATION_BLOCKED build/qemu/serial.log)" -ge 2
          grep -q 'ZMID_ROOT_KEY_OK id=6ca6a5275544c533' build/qemu/serial.log
          test "$(grep -c ZMID_PSS_SIGNATURE_OK build/qemu/serial.log)" -ge 5
          grep -q 'ZMID_DATABASE_VERSION_OK version=1' build/qemu/serial-phase1.log
          grep -q 'ZMID_DATABASE_VERSION_OK version=2' build/qemu/serial-phase2.log
          grep -q 'ZMID_KEY_REJECTED reason=unknown-key' build/qemu/serial-phase1.log
          grep -q 'ZMID_TAMPER_REJECTED reason=payload-digest' build/qemu/serial-phase1.log
          grep -q 'ZMID_ATOMIC_UPDATE_OK version=2' build/qemu/serial-phase1.log
          grep -q 'ZMID_ROLLBACK_REJECTED reason=rollback' build/qemu/serial-phase1.log
          grep -q 'ZENOV_GUARD_WRITE_BLOCKED path=/ransomware-write.bin' build/qemu/serial-phase1.log
          grep -q 'ZENOV_GUARD_WRITE_AUDIT path=/pua-audit.bin' build/qemu/serial-phase1.log
          grep -q 'ZENOV_GUARD_WRITE_BLOCKED path=/split.bin' build/qemu/serial-phase1.log
          grep -q 'ZENOV_GUARD_QUARANTINE_OK path=/samples/ransomware-test.bin' build/qemu/serial-phase1.log
          grep -q 'ZENOV_GUARD_QUARANTINE_LIST_OK entries=2' build/qemu/serial-phase2.log
          grep -q 'ZMID_INIT_FAILED reason=payload-digest' build/qemu/serial-zmid-corrupt.log
          grep -q 'Signed malware intelligence validation failed.' build/qemu/serial-zmid-corrupt.log
          ! grep -q ZENOVOS_UI_READY build/qemu/serial-zmid-corrupt.log
          grep -q 'ZRWP_INIT_FAILED reason=payload-digest' build/qemu/serial-zrwp-corrupt.log
          grep -q 'Signed ransomware policy validation failed.' build/qemu/serial-zrwp-corrupt.log
          ! grep -q ZENOVOS_UI_READY build/qemu/serial-zrwp-corrupt.log
          grep -q 'ZRWP_POLICY_VERSION_OK version=2' build/qemu/serial-phase2.log
          grep -q 'ZRWP_BLOCKED actor=/apps/fileio.elf' build/qemu/serial-phase2.log
          grep -q 'SYNC_OK' build/qemu/serial-phase1.log
          grep -q 'SYNC_OK' build/qemu/serial-phase2.log
          test -x build/zenovfs-antimalware-verify
          build/zenovfs-antimalware-verify build/qemu/zenov-data-runtime.img
          grep -Fqx 'status=PASS' build/qemu/antimalware-evidence.txt
          grep -q GRAPHICS_PCI_OK build/qemu/serial.log
          grep -q FRAMEBUFFER_MAPPED_OK build/qemu/serial.log
          grep -q 'GRAPHICS_MODE_OK 800x600x32' build/qemu/serial.log
          grep -q BACKBUFFER_PRESENT_OK build/qemu/serial.log
          grep -q CLIPPING_OK build/qemu/serial.log
          grep -q ALPHA_BLEND_OK build/qemu/serial.log
          grep -q FONT_RENDER_OK build/qemu/serial.log
          grep -q DESKTOP_SCENE_OK build/qemu/serial.log
          grep -q GRAPHICAL_DESKTOP_READY build/qemu/serial.log
          grep -q PS2_MOUSE_OK build/qemu/serial.log
          grep -q MOUSE_PACKET_OK build/qemu/serial.log
          grep -q WINDOW_DRAG_OK build/qemu/serial.log
          grep -q ZENOVOS_UI_READY build/qemu/serial.log
          grep -q PROCESS_ARGV_OK build/qemu/serial.log
          grep -q SYSCALL_ERRORS_OK build/qemu/serial.log
          grep -q SYSCALL_POINTER_GUARD_OK build/qemu/serial.log
          grep -q CONSOLE_READ_SYSCALL_OK build/qemu/serial.log
          grep -q USER_WRITE_TO_TEXT_BLOCKED build/qemu/serial.log
          grep -q USER_KERNEL_ACCESS_BLOCKED build/qemu/serial.log
          grep -q PAGE_FAULT_DIAGNOSTICS_OK build/qemu/serial.log
          grep -q USER_FAULT_RETURNED_TO_SHELL build/qemu/serial.log
          grep -q ZENOV_SOURCE_APP_RING3_OK build/qemu/serial.log
          grep -q ZENOV_COMPILER_ABI_MATCH_OK build/qemu/serial.log
          grep -q 'recovery=committed' build/qemu/serial.log
          test "$(grep -c 'APP_EXIT code=0' build/qemu/serial.log)" -ge 5
          test "$(grep -c PERSISTENCE_0_1_1_OK build/qemu/serial.log)" -ge 2
          test "$(grep -c FILE_SYSCALL_PERSIST_OK build/qemu/serial.log)" -ge 2
          grep -q 'zenov> ' build/qemu/serial.log
          grep -q '"format": "zenov-os-build-v14"' build/build-manifest.json
          grep -q '"zgdb_schema": 2' build/build-manifest.json
          grep -q '"zgdb_compiled_floor": 3' build/build-manifest.json
          grep -q '"zgdb_root_key_id": "6f788074c018f5aa"' build/build-manifest.json
          grep -q '"zgdb_v3_sha256": "170633b6caf2348e3790cbada7ec5114b03fd73243d8fe572c9e46c237563030"' build/build-manifest.json
          grep -q '"zgdb_v4_sha256": "8445c9d9a48e6572a3d5eb1a7f45f484a7ae8e8fdfe1cce0cc0461a25aabcca6"' build/build-manifest.json
          grep -q '"zcap_schema": 1' build/build-manifest.json
          grep -q '"zcap_compiled_floor": 1' build/build-manifest.json
          grep -q '"zcap_root_key_id": "9202c73fad96ad66"' build/build-manifest.json
          grep -q '"zcap_v1_sha256": "029f784f01afede5d38da066ba239213ace2279eac9381876c70574e2eb89bf1"' build/build-manifest.json
          grep -q '"zcap_v2_sha256": "f325310b94d443fb58df94b56f012ea0b6533fe0cbb453bef2c5d82551a9e51b"' build/build-manifest.json
          grep -q '"zmid_schema": 1' build/build-manifest.json
          grep -q '"zmid_compiled_floor": 1' build/build-manifest.json
          grep -q '"zmid_root_key_id": "6ca6a5275544c533"' build/build-manifest.json
          grep -q '"zmid_v1_sha256": "32fc3531be108d946cb8bcae451ec5a83dbb290abc077ff41eb7f24090655a14"' build/build-manifest.json
          grep -q '"zmid_v2_sha256": "9ba792e8ee0d3a647e784bc0a55727e7d42d6d6e205f5681fdd809fa90727d4e"' build/build-manifest.json
          grep -q '"audit_schema": 1' build/build-manifest.json
          grep -q '"audit_capacity": 64' build/build-manifest.json
          grep -q '"audit_record_bytes": 128' build/build-manifest.json
          grep -q '"audit_journal_bytes": 8288' build/build-manifest.json
          grep -q '"audit_fault_model":' build/build-manifest.json
          grep -q '"zenov_app_contract_sha256": "9e1733af56a53ae31055b448f762815ba7a5e1a72be543aef325bd4ea36e0ad5"' build/build-manifest.json
          grep -qx "$ZENOV_SOURCE_REVISION" dist/SOURCE-REVISION.txt

      - name: Upload verified 0.1.1 audit-fault evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zenov-os-0.1.1-audit-cow-ci
          if-no-files-found: error
          path: |
            build/BOOT.BIN
            build/KERNEL.BIN
            build/kernel.elf
            build/kernel.map
            build/zenov-os.img
            build/zenov-data.img
            build/HELLO.ZEX
            build/ZENOVAPP.ZEX
            build/FILEIO.ELF
            build/ARGS.ELF
            build/CONSOLE.ELF
            build/PROTECT.ELF
            build/KACCESS.ELF
            build/zenovguard-v3.zgdb
            build/zenovguard-v4.zgdb
            build/zenovguard-tampered.zgdb
            build/zenovguard-wrong-key.zgdb
            build/zenovguard-intelligence-v1.zmid
            build/zenovguard-intelligence-v2.zmid
            build/zenovguard-intelligence-tampered.zmid
            build/zenovguard-intelligence-wrong-key.zmid
            build/zenovfs-audit-verify
            build/zenovfs-antimalware-verify
            build/zenovfs-audit-fault-test
            build/build-manifest.json
            build/qemu/serial*.log
            build/qemu/monitor*.log
            build/qemu/qemu*.stderr
            build/qemu/zenov-data*.img
            build/qemu/screenshot.ppm
            build/qemu-files-ui/*.log
            build/qemu-files-ui/*.stderr
            build/qemu-files-ui/*.ppm
            security/zenovguard-root-public.pem
            security/zmid-root-public.pem
            build/qemu/antimalware-evidence.txt
            dist/
            ci-logs/native-build.log
